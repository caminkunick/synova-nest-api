version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: snv-mysql
    restart: always
    ports:
      - "${DB_PORT}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - snv-network

  redis:
    image: redis:7-alpine
    container_name: snv-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - snv-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: snv-phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - mysql
    networks:
      - snv-network

volumes:
  mysql_data:
  redis_data:

networks:
  snv-network:
    driver: bridge
